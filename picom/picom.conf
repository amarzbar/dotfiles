# Fade unfocused windows so the focused one stands out alongside the i3 border.
inactive-opacity = 0.85;
active-opacity   = 1.00;
frame-opacity    = 1.00;
inactive-opacity-override = false;

# Don't dim these — they're transient or already styled.
focus-exclude = [
    "class_g = 'rofi'",
    "class_g = 'i3lock'",
    "class_g = 'Polybar'"
];

# Light fade on focus changes so the transition is visible but not distracting.
fading        = true;
fade-in-step  = 0.05;
fade-out-step = 0.05;
fade-delta    = 8;
